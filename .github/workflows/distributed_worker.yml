name: Distributed Checker Worker
on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

jobs:
  checker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install httpx

      - name: Run Worker
        env:
          COORDINATOR_HOST: 'http://161.35.233.33:5000'
          BATCH_SIZE: '50'
          CONCURRENCY: '50'
          MAX_IDLE_ROUNDS: '2'
          MAX_COMBOS_PER_RUN: '500'
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python worker/worker.py
